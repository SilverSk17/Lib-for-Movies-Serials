<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serialy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/LocalUI.svg">
</head>
<body>
    <div class="container py-4">

        <h1 class="text-center">Seriály</h1>
        <p class="text-center">Tu nájdete zoznam dostupných serialov.</p>

        <!--  -->
        <div class="MainButtons">
            <div class="d-flex gap-2">
                <a href="index.html"><button class="filter-button">Všetko</button></a>
                <a href="filmy.html"><button class="filter-button">Filmy</button></a>
                <a href="serialy.html"><button class="filter-button active-button">Serialy</button></a>
            </div>
            <input type="text" class="form-control search-bar" id="search"
                   placeholder="Vyhľadáj.." onkeyup="searchItems()" style="max-width: 220px;">
        </div>

        <!-- Prvý seriál -->
        <details class="serialy-item mb-4">
            <summary class="serial-header p-3">
                <span class="badge badge-serial">Seriál</span>
                <span class="badge badge-drama">Dráma</span>
                <strong class="ms-2">Seriál</strong>
            </summary>
            <div class="serial-body">

                <div class="row row-cols-2 row-cols-md-4 g-3 align-items-stretch">
                    <div class="col d-flex">
                        <div class="card movie-card w-100">
                            <video class="video-holder" controls>
                                <source src="assets/PLACEHOLDER.mp4" type="video/mp4">
                            </video>
                            <div class="card-body">
                                <h5 class="card-title">S01E01 - A new Threat</h5>
                            </div>
                        </div>
                    </div>

                    <div class="col d-flex">
                        <div class="card movie-card w-100">
                            <video class="video-holder" controls>
                                <source src="assets/PLACEHOLDER.mp4" type="video/mp4">
                            </video>
                            <div class="card-body">
                                <h5 class="card-title">S01E02 - Rising Tensions</h5>
                            </div>
                        </div>
                    </div>

                    <div class="col d-flex">
                        <div class="card movie-card w-100">
                            <video class="video-holder" controls>
                                <source src="assets/PLACEHOLDER.mp4" type="video/mp4">
                            </video>
                            <div class="card-body">
                                <h5 class="card-title">S01E03 - Premonition Of Defeat</h5>
                            </div>
                        </div>
                    </div>

                    <div class="col d-flex">
                        <div class="card movie-card w-100">
                            <video class="video-holder" controls>
                                <source src="assets/PLACEHOLDER.mp4" type="video/mp4">
                            </video>
                            <div class="card-body">
                                <h5 class="card-title">S01E04 - Into the Battle!</h5>
                            </div>
                        </div>
                    </div>

                    <div class="col d-flex">
                        <div class="card movie-card w-100">
                            <video class="video-holder" controls>
                                <source src="assets/PLACEHOLDER.mp4" type="video/mp4">
                            </video>
                            <div class="card-body">
                                <h5 class="card-title">S01E05 - The Dogfight</h5>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </details>

        <!-- Druhý seriál -->
        <details class="serialy-item mb-4">
            <summary class="serial-header p-3">
                <span class="badge badge-serial">Seriál</span>
                <span class="badge badge-krimi">Krimi</span>
                <strong class="ms-2">Seriál</strong>
            </summary>
            <div class="serial-body">
                <div class="row row-cols-4 g-3 align-items-stretch">

                    <div class="col d-flex">
                        <div class="card movie-card w-100">
                            <video class="video-holder" controls>
                                <source src="assets/PLACEHOLDER.mp4" type="video/mp4">
                            </video>
                            <div class="card-body">
                                <h5 class="card-title">S01E01</h5>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </details>
        <div class="text-center mt-4">
            <a href="form.html"><button class="filter-button">Formulár</button></a>
        </div>
        <script src="js/script.js"></script>
    </div>
</body>
</html>
